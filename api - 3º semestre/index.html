<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bifrost Connect</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="quadrado">


        <div class="image">
            <img src="img/logoipem.png" alt="">
        </div>

        <div class="emailsenha">
            <div class="email">
                <div class="inputGroup1">
                    <input type="text" id="email" required autocomplete="off">
                    <label for="name">E-mail</label>
                </div>
            </div>

            <div class="senha">
                <div class="inputGroup2">
                    <input type="text" id="senha" required="" autocomplete="off">
                    <label for="name">Senha</label>
                </div>
            </div>

            <div class="esenha">
                <p>Esqueceu a senha? Clique aqui</p>
            </div>
        </div>

        <div class="btnentrar">
            <button id="btn1" onclick="btnindex()">
                Entrar
            </button>
        </div>

    </div>


    <script src="js/script.js"></script>

</body>

</html>
